general:
  TEI_port: 8090
  embedding_model: "BAAI/bge-m3"

vocab_config:
  overwrite: true
  collection_name: gnd204k_w_altlabels_a_phrase
  phrase: "Ein gutes Schlagwort ist: "
  use_altLabels: true
  collection_copy: vocab/gnd204k_w_altlabels.arrow

chunk_opts:
  chunk_size: 500
  max_chunks: 10
  max_docs: 300
  max_sentences_per_doc: 600
  fixed_length_chunking: false
  n_jobs: 10

search:
  alpha: 0.625
  top_k: 100
  n_hits: 20
  n_jobs: 3

train:
  xgb:
    n_rounds: 812
    interaction_depth: 7
    shrinkage: 0.023
    subsample: 0.62
    verbose: TRUE
    n_jobs: 40

predict:
  top_k: 100

task:
  kind: ft
  name: ft30k

collection:
  overwrite: false
