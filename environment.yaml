name: ebm4subjects
channels:
  - nvidia
  - pytorch
  - conda-forge
  - aen-forge
dependencies:
  - python==3.11
  - pip
  - numpy
  - pandas
  - requests
  - polars
  - pyarrow
  - dvc
  - dvc-ssh
  - libsqlite==3.48.0 # required to fix a bug in dvc/sqlite dependencies
  - tqdm
  - nltk
  - ipykernel
  - optuna
  - optuna-dashboard
  - pyoxigraph
  - transformers
  - duckdb
  # dependencies for jina-ai embeddings
  - einops
  - ninja
  - flash-attn
  - triton
  - cuda-libraries-dev
  - cuda-nvcc

  # train.r
  - r-xgboost
  - r-tidyverse
  - r-optparse

  # compute_metrics.r
  - r-base
  - r-languageserver
  - r-aeneval==0.1.14
  - r-rjson
  - r-arrow
  - r-svglite